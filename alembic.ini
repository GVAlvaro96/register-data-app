[alembic]
script_location = alembic

# Este valor se sobrescribe en alembic/env.py usando DATABASE_URL.
sqlalchemy.url = postgresql://user:pass@localhost:5432/dbname

[loggers]
keys = root,sqlalchemy,alembic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handlers]
keys = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatters]
keys = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
class = logging.Formatter

